<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <style>
    .ring {
      stroke: #12100d;
      stroke-width: 3.5;
    }
    .circuit-line {
      stroke: #de9921;
      stroke-width: 2.5;
      stroke-linecap: round;
    }
    .circuit-dot {
      fill: #de9921;
    }
    @media (prefers-color-scheme: dark) {
      .ring {
        stroke: #ffffff;
      }
    }
  </style>
  <!-- The OBAOL Logo Mark Ring -->
  <circle cx="18" cy="16" r="9" class="ring" />
  <!-- Circuit trace entering the O ring -->
  <path d="M 4 16 L 18 16" class="circuit-line" />
  <!-- Central circuit node -->
  <circle cx="18" cy="16" r="2.5" class="circuit-dot" />
</svg>
